<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soydeli Admin</title>
    <meta
      name="description"
      content="Soydeli Tofu admin panel — manage orders, menu, and deliveries."
    />
    <meta
      name="keywords"
      content="soydeli, tofu, admin, orders, kolhapur"
    />

    <!-- Open Graph tags for social sharing -->
    <meta property="og:title" content="Soydeli Tofu Admin" />
    <meta
      property="og:description"
      content="Manage Soydeli Tofu orders and product catalog"
    />
    <meta property="og:url" content="https://www.yangadsartgallery.in/" />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Check if we need to redirect to a specific path
      (function () {
        const redirect = sessionStorage.getItem("redirect");
        if (redirect) {
          sessionStorage.removeItem("redirect");
          if (redirect !== location.pathname) {
            history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "@id": "https://www.yangadsartgallery.in/",
        "name": "Soydeli Tofu",
        "url": "https://www.yangadsartgallery.in/",
        "logo": "https://www.yangadsartgallery.in/logo.png",
        "description": "Reimagining commercial spaces with creativity, precision, and purpose. Specializing in Design & Build and General Contracting.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "72/12, Nallurahalli Main Rd, Near Shell Petrol Pump",
          "addressLocality": "Bangalore",
          "addressCountry": "India"
        },
        "telephone": "+91 96060 64203",
        "email": "connect@futureal.in",
        "founder": {
          "@type": "Person",
          "name": "Abhishek Kumar",
          "jobTitle": "Founder & CEO"
        }
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
