services:
  - type: web
    name: soydeli-frontend
    rootDir: .
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /assets/*.css
        name: Content-Type
        value: text/css; charset=utf-8
      - path: /assets/*.js
        name: Content-Type
        value: application/javascript; charset=utf-8
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
